<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenPath Studios</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: url('background.png') no-repeat center center fixed;
      background-size: cover;
      color: #2e3b3a;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #ddd;
      position: relative;
    }

    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .header-container h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 1px;
    }

    nav {
      margin-top: 0.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    nav a {
      color: #2e3b3a;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
      font-size: 1rem;
    }

    nav a:hover {
      opacity: 0.75;
    }

    .coffee-button {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      transform: scale(1);
      transform-origin: top right;
      transition: transform 0.3s ease;
    }

    main {
      flex-grow: 1;
      padding: 2rem 1rem;
      max-width: 700px;
      background-color: transparent;
      text-align: center;
      color: #2e3b3a;
      margin: 2rem auto 0 auto;
    }

    h2 {
      color: #455a64;
    }

    footer {
      background-color: #f5f5f7;
      color: #2e3b3a;
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
      border-top: 1px solid #ccc;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-container h1 {
        font-size: 1.6rem;
      }

      nav a {
        font-size: 0.95rem;
      }

      .coffee-button {
        transform: scale(0.85);
        right: 1rem;
      }
    }

    @media (max-width: 480px) {
      .header-container h1 {
        font-size: 1.4rem;
      }

      nav {
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      .coffee-button {
        position: static;
        margin-top: 1rem;
        transform: scale(0.9);
      }

      main {
        padding: 2rem 1rem 5rem 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <h1>ZenPath Studios | Apps</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="apps.html">Apps</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
      </nav>
      <div class="coffee-button">
        <script type="text/javascript" 
          src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" 
          data-name="bmc-button" 
          data-slug="ZenPath" 
          data-color="#40DCA5" 
          data-emoji="❤️"  
          data-font="Bree" 
          data-text="Support the creator" 
          data-outline-color="#000000" 
          data-font-color="#ffffff" 
          data-coffee-color="#FFDD00">
        </script>
      </div>
    </div>
  </header>

  <main>
    <h2>Apps</h2>
    <p>Placeholder for Apps</p>
  </main>

  <footer>
    <p>&copy; 2025 ZenPath Studios. All rights reserved.</p>
  </footer>

</body>
</html>
